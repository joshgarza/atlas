name: atlas

services:
  atlas:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - atlas-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  atlas-data:
