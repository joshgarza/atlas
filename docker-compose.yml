name: atlas

services:
  atlas:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - atlas-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  google-calendar-collector:
    build: .
    command: ["node", "--import", "tsx", "src/collectors/run-google-calendar.ts", "--poll"]
    environment:
      - GOOGLE_ACCESS_TOKEN=${GOOGLE_ACCESS_TOKEN:-}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GOOGLE_CALENDAR_IDS=${GOOGLE_CALENDAR_IDS:-primary}
      - ATLAS_URL=http://atlas:3001
      - SYNC_LOOKBACK_DAYS=${SYNC_LOOKBACK_DAYS:-30}
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-300000}
    depends_on:
      atlas:
        condition: service_healthy
    restart: unless-stopped

  email-collector:
    build: .
    command: ["node", "--import", "tsx", "src/collectors/run-email.ts", "--poll"]
    volumes:
      - email-state:/app/data
    environment:
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID:?Set GMAIL_CLIENT_ID to your Google OAuth2 client ID}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET:?Set GMAIL_CLIENT_SECRET to your Google OAuth2 client secret}
      - GMAIL_REFRESH_TOKEN=${GMAIL_REFRESH_TOKEN:?Set GMAIL_REFRESH_TOKEN to your Google OAuth2 refresh token}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY to your Anthropic API key}
      - ATLAS_URL=http://atlas:3001
      - EMAIL_STATE_DIR=/app/data
    depends_on:
      atlas:
        condition: service_healthy
    restart: unless-stopped

volumes:
  atlas-data:
  email-state:
